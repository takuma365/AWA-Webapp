events {
    worker_connections 1024;
}

http {
    # ファイルアップロードサイズ制限を設定
    client_max_body_size 100M;       # 最大100MBまでのファイルアップロードを許可
    
    # VPN接続時のIPアドレスとDocker内部ネットワークを許可
    geo $allowed_ip {
        default 0;                    # デフォルトは拒否
        54.248.141.21 1;             # VPN接続時のIPアドレスのみ許可
        172.16.0.0/12 1;             # Docker内部ネットワーク範囲
        192.168.0.0/16 1;            # Docker内部ネットワーク範囲（予備）
    }

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:5173;
    }

    # ログフォーマット
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    server {
        listen 80;
        server_name _;

        # アクセスログ
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log;

        # IP制限チェック
        if ($allowed_ip = 0) {
            return 403 "Access denied from your IP address: $remote_addr";
        }

        # フロントエンド（React）へのプロキシ
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket サポート
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # バックエンドAPI（Django）へのプロキシ
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django管理画面へのプロキシ
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 静的ファイル
        location /static/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # メディアファイル
        location /media/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ヘルスチェック
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
